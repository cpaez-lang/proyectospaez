<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="BBVA Seguros PYMES cover">
  <defs>
    <linearGradient id="bg-pymes" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04284A"/>
      <stop offset="100%" stop-color="#7A2A0A"/>
    </linearGradient>
    <linearGradient id="acc-pymes" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <pattern id="grid-pymes" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-pymes)"/>
  <rect width="1200" height="630" fill="url(#grid-pymes)"/>

  <!-- Funnel pipeline (5 steps) -->
  <g transform="translate(80,420)">
    <g font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">
      <g><rect width="180" height="56" rx="10" fill="#FF6B35"/><text x="90" y="34">Referido</text></g>
      <g transform="translate(190,0)"><rect width="180" height="56" rx="10" fill="#F08522"/><text x="90" y="34">Cotización</text></g>
      <g transform="translate(380,0)"><rect width="180" height="56" rx="10" fill="#E29D17"/><text x="90" y="34">Operaciones</text></g>
      <g transform="translate(570,0)"><rect width="180" height="56" rx="10" fill="#D4B30D"/><text x="90" y="34">Póliza</text></g>
      <g transform="translate(760,0)"><rect width="180" height="56" rx="10" fill="#C7C701"/><text x="90" y="34">Posventa</text></g>
    </g>
    <g fill="rgba(255,255,255,0.85)" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800">
      <text x="270" y="33" text-anchor="middle">→</text>
      <text x="460" y="33" text-anchor="middle">→</text>
      <text x="650" y="33" text-anchor="middle">→</text>
      <text x="840" y="33" text-anchor="middle">→</text>
    </g>
  </g>

  <!-- Tag -->
  <rect x="80" y="80" width="220" height="40" rx="20" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.20)"/>
  <text x="190" y="106" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff" letter-spacing="3">PYMES · SEGUROS</text>

  <!-- Title -->
  <text x="80" y="240" font-family="Inter, system-ui, sans-serif" font-size="96" font-weight="800" fill="#fff" letter-spacing="-3">BBVA Seguros</text>
  <text x="80" y="320" font-family="Inter, system-ui, sans-serif" font-size="96" font-weight="800" fill="url(#acc-pymes)" letter-spacing="-3">PYMES</text>

  <!-- Tagline -->
  <text x="80" y="370" font-family="Inter, system-ui, sans-serif" font-size="22" fill="rgba(255,255,255,0.78)">Flujo comercial end-to-end para seguros empresariales</text>

  <!-- Author footer -->
  <text x="1120" y="582" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.55)" letter-spacing="2">CAMILO PÁEZ · 2025</text>
</svg>
