<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Camilo & Claudia · Video institucional">
  <defs>
    <linearGradient id="cc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#032D60"/>
      <stop offset="100%" stop-color="#021843"/>
    </linearGradient>
    <linearGradient id="cc-acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0070D2"/>
      <stop offset="100%" stop-color="#1B96FF"/>
    </linearGradient>
    <pattern id="cc-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#cc-bg)"/>
  <rect width="1200" height="630" fill="url(#cc-grid)"/>

  <!-- Decorative network nodes -->
  <g opacity="0.55">
    <circle cx="940"  cy="120" r="6" fill="#1B96FF"/>
    <circle cx="1040" cy="200" r="4" fill="#1B96FF"/>
    <circle cx="900"  cy="240" r="5" fill="#00A1E0"/>
    <circle cx="1100" cy="320" r="3" fill="#1B96FF"/>
    <circle cx="980"  cy="380" r="6" fill="#0070D2"/>
    <line x1="940" y1="120" x2="1040" y2="200" stroke="#1B96FF" stroke-width="1" opacity="0.4"/>
    <line x1="1040" y1="200" x2="900" y2="240" stroke="#1B96FF" stroke-width="1" opacity="0.4"/>
    <line x1="900" y1="240" x2="980" y2="380" stroke="#1B96FF" stroke-width="1" opacity="0.4"/>
    <line x1="1040" y1="200" x2="1100" y2="320" stroke="#1B96FF" stroke-width="1" opacity="0.4"/>
    <line x1="1100" y1="320" x2="980" y2="380" stroke="#1B96FF" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Salesforce cloud -->
  <g transform="translate(80, 80)">
    <ellipse cx="40" cy="20" rx="22" ry="14" fill="#fff"/>
    <ellipse cx="60" cy="14" rx="26" ry="18" fill="#fff"/>
    <ellipse cx="82" cy="20" rx="22" ry="14" fill="#fff"/>
    <rect x="22" y="20" width="80" height="20" fill="#fff"/>
    <text x="62" y="34" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#032D60">SALESFORCE</text>
  </g>

  <!-- Tag -->
  <rect x="80" y="160" width="320" height="40" rx="20" fill="rgba(27,150,255,0.12)" stroke="rgba(27,150,255,0.5)"/>
  <text x="240" y="186" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1B96FF" letter-spacing="3">VIDEO INSTITUCIONAL · 5 MIN</text>

  <!-- Title -->
  <text x="80" y="290" font-family="Inter, system-ui, sans-serif" font-size="92" font-weight="800" fill="#fff" letter-spacing="-3">Camilo</text>
  <text x="80" y="380" font-family="Inter, system-ui, sans-serif" font-size="92" font-weight="800" fill="url(#cc-acc)" letter-spacing="-3">&amp; Claudia</text>

  <!-- Tagline -->
  <text x="80" y="430" font-family="Inter, system-ui, sans-serif" font-size="22" fill="rgba(255,255,255,0.78)">Cómo un SE y Claude Code transformaron la velocidad</text>
  <text x="80" y="460" font-family="Inter, system-ui, sans-serif" font-size="22" fill="rgba(255,255,255,0.78)">de entrega de demos en Salesforce Colombia</text>

  <!-- Play button -->
  <g transform="translate(960, 460)">
    <circle cx="60" cy="60" r="60" fill="#1B96FF"/>
    <polygon points="48,32 48,88 92,60" fill="#fff"/>
  </g>

  <!-- Bottom chips -->
  <g font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff">
    <g><rect x="80" y="555" width="76" height="34" rx="17" fill="rgba(255,255,255,0.10)"/><text x="118" y="577" text-anchor="middle">5 min</text></g>
    <g><rect x="166" y="555" width="76" height="34" rx="17" fill="rgba(255,255,255,0.10)"/><text x="204" y="577" text-anchor="middle">1080p</text></g>
    <g><rect x="252" y="555" width="86" height="34" rx="17" fill="rgba(255,255,255,0.10)"/><text x="295" y="577" text-anchor="middle">Subtítulos</text></g>
    <g><rect x="348" y="555" width="120" height="34" rx="17" fill="rgba(255,255,255,0.10)"/><text x="408" y="577" text-anchor="middle">Voz colombiana</text></g>
  </g>

  <text x="1120" y="582" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.55)" letter-spacing="2">CAMILO PÁEZ · 2026</text>
</svg>
