  <!-- Tag -->
  <rect x="80" y="80" width="220" height="40" rx="20" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.20)"/>
  <text x="190" y="106" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff" letter-spacing="3">FSC · WEALTH</text>

  <!-- Title -->
  <text x="80" y="240" font-family="Inter, system-ui, sans-serif" font-size="80" font-weight="800" fill="#fff" letter-spacing="-3">Priority</text>
  <text x="80" y="310" font-family="Inter, system-ui, sans-serif" font-size="80" font-weight="800" fill="url(#acc-pk)" letter-spacing="-3">Kanban</text>

  <text x="80" y="360" font-family="Inter, system-ui, sans-serif" font-size="22" fill="rgba(255,255,255,0.78)">Score 0–100 · 5 factores · refresh diario</text>

  <text x="1120" y="582" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.55)" letter-spacing="2">CAMILO PÁEZ · 2025</text>
</svg>
