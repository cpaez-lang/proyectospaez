<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Priority Kanban cover">
  <defs>
    <linearGradient id="bg-pk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1F3D"/>
      <stop offset="100%" stop-color="#02050E"/>
    </linearGradient>
    <linearGradient id="acc-pk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0088CE"/>
      <stop offset="100%" stop-color="#16C172"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-pk)"/>

  <!-- Kanban columns -->
  <g transform="translate(560,100)" font-family="Inter, system-ui, sans-serif">
    <!-- Crítico -->
    <g>
      <rect x="0" y="0" width="180" height="430" rx="14" fill="rgba(255,80,80,0.08)" stroke="rgba(255,80,80,0.4)"/>
      <text x="90" y="34" text-anchor="middle" font-size="14" font-weight="800" fill="#FF6B6B" letter-spacing="2">CRÍTICO</text>
      <g fill="#fff" font-size="11" font-weight="600">
        <rect x="14" y="58" width="152" height="56" rx="8" fill="rgba(255,255,255,0.08)"/>
        <text x="28" y="80">M.González</text>
        <text x="28" y="100" fill="rgba(255,255,255,0.6)">Score · 92</text>
        <rect x="14" y="124" width="152" height="56" rx="8" fill="rgba(255,255,255,0.08)"/>
        <text x="28" y="146">L.Vargas</text>
        <text x="28" y="166" fill="rgba(255,255,255,0.6)">Score · 87</text>
      </g>
    </g>
    <!-- Importante -->
    <g transform="translate(200,0)">
      <rect x="0" y="0" width="180" height="430" rx="14" fill="rgba(239,159,39,0.08)" stroke="rgba(239,159,39,0.4)"/>
      <text x="90" y="34" text-anchor="middle" font-size="14" font-weight="800" fill="#EFB360" letter-spacing="2">IMPORTANTE</text>
      <g fill="#fff" font-size="11" font-weight="600">
        <rect x="14" y="58" width="152" height="56" rx="8" fill="rgba(255,255,255,0.08)"/>
        <text x="28" y="80">C.Mendoza</text>
        <text x="28" y="100" fill="rgba(255,255,255,0.6)">Score · 71</text>
        <rect x="14" y="124" width="152" height="56" rx="8" fill="rgba(255,255,255,0.08)"/>
        <text x="28" y="146">A.Moreno</text>
        <text x="28" y="166" fill="rgba(255,255,255,0.6)">Score · 65</text>
        <rect x="14" y="190" width="152" height="56" rx="8" fill="rgba(255,255,255,0.08)"/>
        <text x="28" y="212">G.Cifuentes</text>
        <text x="28" y="232" fill="rgba(255,255,255,0.6)">Score · 60</text>
      </g>
    </g>
    <!-- Seguimiento -->
    <g transform="translate(400,0)">
      <rect x="0" y="0" width="180" height="430" rx="14" fill="rgba(22,193,114,0.08)" stroke="rgba(22,193,114,0.4)"/>
      <text x="90" y="34" text-anchor="middle" font-size="14" font-weight="800" fill="#4DD3A1" letter-spacing="2">SEGUIMIENTO</text>
      <g fill="#fff" font-size="11" font-weight="600">
        <rect x="14" y="58" width="152" height="56" rx="8" fill="rgba(255,255,255,0.08)"/>
        <text x="28" y="80">J.Castellanos</text>
        <text x="28" y="100" fill="rgba(255,255,255,0.6)">Score · 42</text>
