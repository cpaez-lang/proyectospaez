<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Co-piloto de Reunión cover">
  <defs>
    <linearGradient id="bg-cr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A2E3D"/>
      <stop offset="100%" stop-color="#020A0E"/>
    </linearGradient>
    <linearGradient id="acc-cr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1FE0E0"/>
      <stop offset="100%" stop-color="#16C172"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-cr)"/>

  <!-- Efficient frontier curve + dots -->
  <g transform="translate(620,140)" opacity="0.95">
    <rect x="0" y="0" width="500" height="350" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)"/>
    <text x="20" y="34" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.7)" letter-spacing="2">FRONTERA EFICIENTE</text>

    <!-- Axes -->
    <line x1="60" y1="280" x2="460" y2="280" stroke="rgba(255,255,255,0.25)"/>
    <line x1="60" y1="60" x2="60" y2="280" stroke="rgba(255,255,255,0.25)"/>
    <text x="460" y="304" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">riesgo σ</text>
    <text x="48" y="60" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" transform="rotate(-90 48 60)">retorno μ</text>

    <!-- Curve -->
    <path d="M 60 280 Q 110 240 160 200 T 280 130 T 440 80" stroke="url(#acc-cr)" stroke-width="3" fill="none"/>
    <circle cx="160" cy="200" r="6" fill="#1FE0E0"/>
    <circle cx="280" cy="130" r="7" fill="#16C172"/>
    <circle cx="380" cy="95" r="5" fill="#1FE0E0"/>

    <!-- Optimum tag -->
    <g transform="translate(280,130)">
      <line x1="0" y1="0" x2="40" y2="-30" stroke="rgba(255,255,255,0.35)"/>
      <rect x="40" y="-50" width="120" height="32" rx="8" fill="#16C172"/>
      <text x="100" y="-29" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#02110A">ÓPTIMO · MODERADO</text>
    </g>
  </g>

  <!-- Tag -->
  <rect x="80" y="80" width="180" height="40" rx="20" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.20)"/>
  <text x="170" y="106" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff" letter-spacing="3">DEMO · WEB</text>

  <text x="80" y="240" font-family="Inter, system-ui, sans-serif" font-size="78" font-weight="800" fill="#fff" letter-spacing="-3">Co-piloto</text>
  <text x="80" y="310" font-family="Inter, system-ui, sans-serif" font-size="78" font-weight="800" fill="url(#acc-cr)" letter-spacing="-3">de Reunión</text>

  <text x="80" y="360" font-family="Inter, system-ui, sans-serif" font-size="22" fill="rgba(255,255,255,0.78)">12 preguntas · perfil de riesgo · Markowitz en vivo</text>

  <g font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff">
    <g><rect x="80" y="555" width="68" height="34" rx="17" fill="rgba(255,255,255,0.12)"/><text x="114" y="577" text-anchor="middle">HTML</text></g>
    <g><rect x="158" y="555" width="116" height="34" rx="17" fill="rgba(255,255,255,0.12)"/><text x="216" y="577" text-anchor="middle">JavaScript</text></g>
    <g><rect x="284" y="555" width="200" height="34" rx="17" fill="rgba(255,255,255,0.12)"/><text x="384" y="577" text-anchor="middle">Markowitz–Ledoit-Wolf</text></g>
  </g>

  <text x="1120" y="582" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.55)" letter-spacing="2">CAMILO PÁEZ · 2025</text>
</svg>
