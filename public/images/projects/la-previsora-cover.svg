<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="La Previsora cover">
  <defs>
    <linearGradient id="bg-prev" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3D0A0A"/>
      <stop offset="100%" stop-color="#1A0303"/>
    </linearGradient>
    <linearGradient id="acc-prev" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#FFE066"/>
    </linearGradient>
    <pattern id="grid-prev" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-prev)"/>
  <rect width="1200" height="630" fill="url(#grid-prev)"/>

  <!-- Shield emblem -->
  <g transform="translate(900,170)" opacity="0.95">
    <path d="M 100 0 L 200 50 L 200 180 L 100 260 L 0 180 L 0 50 Z"
          fill="rgba(255,179,0,0.12)" stroke="#FFB300" stroke-width="2.5"/>
    <text x="100" y="125" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800" fill="#FFE066">LP</text>
    <text x="100" y="160" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.75)" letter-spacing="3">+70 AÑOS</text>
  </g>

  <!-- Tag -->
  <rect x="80" y="80" width="270" height="40" rx="20" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.20)"/>
  <text x="215" y="106" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff" letter-spacing="3">ASEGURADORA ESTATAL</text>

  <!-- Title -->
  <text x="80" y="240" font-family="Inter, system-ui, sans-serif" font-size="92" font-weight="800" fill="#fff" letter-spacing="-3">La Previsora</text>
  <text x="80" y="320" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="700" fill="url(#acc-prev)" letter-spacing="-1">300K+ asegurados</text>

  <!-- Tagline -->
  <text x="80" y="370" font-family="Inter, system-ui, sans-serif" font-size="22" fill="rgba(255,255,255,0.78)">Demo integral · vigilada SFC · 4 journeys</text>

  <!-- Stack chips -->
  <g font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff">
    <g><rect x="80" y="555" width="60" height="34" rx="17" fill="rgba(255,255,255,0.12)"/><text x="110" y="577" text-anchor="middle">FSC</text></g>
    <g><rect x="150" y="555" width="116" height="34" rx="17" fill="rgba(255,255,255,0.12)"/><text x="208" y="577" text-anchor="middle">Service Cloud</text></g>
    <g><rect x="276" y="555" width="98" height="34" rx="17" fill="rgba(255,255,255,0.12)"/><text x="325" y="577" text-anchor="middle">Agentforce</text></g>
    <g><rect x="384" y="555" width="120" height="34" rx="17" fill="rgba(255,255,255,0.12)"/><text x="444" y="577" text-anchor="middle">Experience LWR</text></g>
  </g>

  <text x="1120" y="582" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.55)" letter-spacing="2">CAMILO PÁEZ · 2025</text>
</svg>
