<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="AXA Colpatria cover">
  <defs>
    <linearGradient id="bg-axa" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00008F"/>
      <stop offset="100%" stop-color="#000044"/>
    </linearGradient>
    <linearGradient id="acc-axa" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF1721"/>
      <stop offset="100%" stop-color="#FF7A4D"/>
    </linearGradient>
    <pattern id="grid-axa" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-axa)"/>
  <rect width="1200" height="630" fill="url(#grid-axa)"/>

  <!-- Cross + heart split -->
  <g transform="translate(880,140)">
    <!-- shield seguros -->
    <path d="M 20 60 L 100 20 L 180 60 L 180 180 L 100 240 L 20 180 Z"
          fill="rgba(255,23,33,0.18)" stroke="#FF1721" stroke-width="2.5"/>
    <text x="100" y="142" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#fff">AXIO</text>
    <text x="100" y="170" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.7)">SEGUROS</text>
  </g>
  <g transform="translate(880,310)">
    <!-- heart salud -->
    <path d="M 100 230 C 60 200 20 170 20 110 C 20 70 50 50 80 50 C 100 50 100 70 100 70 C 100 70 100 50 120 50 C 150 50 180 70 180 110 C 180 170 140 200 100 230 Z"
          fill="rgba(0,212,170,0.16)" stroke="#00D4AA" stroke-width="2.5"/>
    <text x="100" y="142" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#fff">AXIA</text>
    <text x="100" y="170" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.7)">SALUD</text>
  </g>

  <!-- Tag -->
  <rect x="80" y="80" width="240" height="40" rx="20" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.20)"/>
  <text x="200" y="106" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff" letter-spacing="3">SEGUROS + SALUD</text>

  <!-- Title -->
  <text x="80" y="240" font-family="Inter, system-ui, sans-serif" font-size="100" font-weight="800" fill="#fff" letter-spacing="-3">AXA</text>
  <text x="80" y="340" font-family="Inter, system-ui, sans-serif" font-size="100" font-weight="800" fill="url(#acc-axa)" letter-spacing="-3">Colpatria</text>

  <!-- Tagline -->
  <text x="80" y="390" font-family="Inter, system-ui, sans-serif" font-size="22" fill="rgba(255,255,255,0.78)">Vista 360 bilingüe · ajustadores y revisores médicos</text>

  <!-- Stack chips -->
  <g font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff">
    <g><rect x="80" y="555" width="60" height="34" rx="17" fill="rgba(255,255,255,0.12)"/><text x="110" y="577" text-anchor="middle">FSC</text></g>
    <g><rect x="150" y="555" width="118" height="34" rx="17" fill="rgba(255,255,255,0.12)"/><text x="209" y="577" text-anchor="middle">Health Cloud</text></g>
    <g><rect x="278" y="555" width="98" height="34" rx="17" fill="rgba(255,255,255,0.12)"/><text x="327" y="577" text-anchor="middle">Agentforce</text></g>
    <g><rect x="386" y="555" width="60" height="34" rx="17" fill="rgba(255,255,255,0.12)"/><text x="416" y="577" text-anchor="middle">LWR</text></g>
  </g>

  <!-- Author footer -->
  <text x="1120" y="582" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.55)" letter-spacing="2">CAMILO PÁEZ · 2025</text>
</svg>
