<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Camilo Páez · Solutions Engineering · Salesforce · Claude Code">
  <defs>
    <linearGradient id="bg-og" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0C0C0E"/>
      <stop offset="100%" stop-color="#1A1B22"/>
    </linearGradient>
    <linearGradient id="acc-og" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0070D2"/>
      <stop offset="100%" stop-color="#EF9F27"/>
    </linearGradient>
    <pattern id="grid-og" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <filter id="og-glow">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-og)"/>
  <rect width="1200" height="630" fill="url(#grid-og)"/>

  <!-- CP logo emblem -->
  <g transform="translate(900,160)" opacity="0.95">
    <circle cx="150" cy="150" r="190" fill="none" stroke="url(#acc-og)" stroke-width="0.8" opacity="0.4"/>
    <circle cx="150" cy="150" r="170" fill="none" stroke="url(#acc-og)" stroke-width="0.6" opacity="0.55" stroke-dasharray="3 8"/>
    <polygon points="150,20 280,90 280,210 150,280 20,210 20,90"
             fill="rgba(0,112,210,0.10)" stroke="url(#acc-og)" stroke-width="1.2" opacity="0.7"/>
    <circle cx="150" cy="150" r="100" fill="url(#acc-og)" opacity="0.13" filter="url(#og-glow)"/>
    <text x="150" y="186" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="130" font-weight="800" fill="url(#acc-og)" letter-spacing="-8">CP</text>
    <circle cx="240" cy="80" r="5" fill="#EF9F27"/>
  </g>

  <!-- Tag -->
  <rect x="80" y="100" width="320" height="40" rx="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)"/>
  <text x="240" y="126" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fff" letter-spacing="3">SOLUTIONS ENGINEER · COLOMBIA</text>

  <!-- Title -->
  <text x="80" y="270" font-family="Inter, system-ui, sans-serif" font-size="100" font-weight="800" fill="#fff" letter-spacing="-4">Camilo Páez</text>

  <!-- Subtitle -->
  <text x="80" y="350" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="700" fill="url(#acc-og)" letter-spacing="-1">Proyectos · Demos · Salesforce</text>

  <!-- Tagline -->
  <text x="80" y="410" font-family="Inter, system-ui, sans-serif" font-size="22" fill="rgba(255,255,255,0.75)">Solutions Engineering · Claude Code · Salesforce platform</text>

  <!-- Clients row -->
  <g font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.55)" letter-spacing="3">
    <text x="80" y="538">CLIENTES</text>
  </g>
  <g font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="rgba(255,255,255,0.85)">
    <text x="80" y="572">BBVA</text>
    <text x="200" y="572" fill="rgba(255,255,255,0.30)">·</text>
    <text x="222" y="572">AXA</text>
    <text x="312" y="572" fill="rgba(255,255,255,0.30)">·</text>
    <text x="334" y="572">La Previsora</text>
    <text x="510" y="572" fill="rgba(255,255,255,0.30)">·</text>
    <text x="532" y="572">Wealth · Salud · Seguros</text>
  </g>

  <!-- Built with -->
  <text x="1120" y="582" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" letter-spacing="2">2025 · proyectospaez.com</text>
</svg>
